<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500">
  <defs>
    <mask id="stripesMask">
      <rect width="1400" height="500" fill="black"/>
      <g fill="white">
        <rect x="0" y="90" width="1400" height="26"/>
        <rect x="0" y="130" width="1400" height="26"/>
        <rect x="0" y="170" width="1400" height="26"/>
        <rect x="0" y="210" width="1400" height="26"/>
        <rect x="0" y="250" width="1400" height="26"/>
        <rect x="0" y="290" width="1400" height="26"/>
        <rect x="0" y="330" width="1400" height="26"/>
        <rect x="0" y="370" width="1400" height="26"/>
      </g>
    </mask>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ffffff" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#softGlow)">
    <g mask="url(#stripesMask)">
      <text x="700" y="330"
            text-anchor="middle"
            font-family="Arial Black, Impact, system-ui, sans-serif"
            font-size="260"
            letter-spacing="14"
            fill="#ffffff">BRC</text>
    </g>
  </g>
</svg>
